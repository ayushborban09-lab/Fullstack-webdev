<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="calculator">
        <!-- <div class="input"></div> -->
         <input type="text" placeholder="0">
        <div class="btnss">
            <div class="btnrow1">
                <button id="red">AC</button>
                <button id="green">DEL</button>
                <button id="green">%</button>
                <button id="green">/</button>
            </div>
            <div class="btnrow1">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button id="green">*</button>
            </div>
            <div class="btnrow1">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button id="green">-</button>
            </div>
            <div class="btnrow1">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button id="green">+</button>
            </div>
            <div class="btnrow1">
                <button>00</button>
                <button>0</button>
                <button id="green">.</button>
                <button id="green">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
