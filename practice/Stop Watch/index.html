<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>

<body>
   
    <main>
         <h1 id="stopwatch">StopWatch</h1>
        <div class="time">
        <h1><span>00</span> : <span>00</span> : <span>00</span></h1>
    </div>
    <div class="buttons">
        <button id="stop"><i class="ri-stop-large-fill"></i></button>
        <button id="start"><i class="ri-play-large-fill"></i></button>
        <button id="restart"><i class="ri-reset-right-line"></i></button>
    </div>
    </main>
    <script src="script.js"></script>
</body>
