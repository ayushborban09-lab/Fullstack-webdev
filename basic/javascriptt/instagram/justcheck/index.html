<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocialX</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="mobile-container">

  <!-- Header -->
  <div class="header">
    <i class="fa-solid fa-plus"></i>
    <h1>SocialX</h1>
    <i class="fa-regular fa-heart"></i>
  </div>

  <!-- Stories -->
  <div class="stories">
    <div class="story">
      <img src="https://i.pravatar.cc/100?img=11" alt="">
    </div>

    <div class="story">
      <img src="https://i.pravatar.cc/100?img=12" alt="">
    </div>

    <div class="story">
      <img src="https://i.pravatar.cc/100?img=13" alt="">
    </div>

    <div class="story">
      <img src="https://i.pravatar.cc/100?img=14" alt="">
    </div>

    <div class="story">
      <img src="https://i.pravatar.cc/100?img=15" alt="">
    </div>
  </div>

  <!-- Post Header -->
  <div class="post-header">
    <div class="user-info">
      <img src="https://i.pravatar.cc/50?img=20" alt="">
      <span>Traian Titilincu</span>
    </div>

    <button>Follow</button>
  </div>

  <!-- Main Post -->
  <div class="post-image">
    <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=800&auto=format&fit=crop" alt="">
  </div>

  <!-- Actions -->
  <div class="actions">
    <div class="left-icons">
      <i class="fa-solid fa-heart like-btn"></i>
      <i class="fa-regular fa-comment"></i>
      <i class="fa-solid fa-repeat"></i>
      <i class="fa-regular fa-paper-plane"></i>
    </div>

    <i class="fa-regular fa-bookmark"></i>
  </div>

  <!-- Footer User -->
  <div class="post-header bottom-user">
    <div class="user-info">
      <img src="https://i.pravatar.cc/50?img=30" alt="">
      <span>Antonio Verdin</span>
    </div>

    <button>Follow</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
